version: '3.9'

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: notes-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: demo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d demo']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - notes-network

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: notes-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - notes-network

  # ── Elasticsearch ───────────────────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: notes-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - '9200:9200'
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ['CMD-SHELL', 'curl -s http://localhost:9200 >/dev/null || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - notes-network

  # ── Kibana ──────────────────────────────────────────────────────────────────
  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: notes-kibana
    restart: unless-stopped
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - '5601:5601'
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'curl -s http://localhost:5601/api/status >/dev/null || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - notes-network

  # ── .NET API ────────────────────────────────────────────────────────────────
  notes-api:
    build:
      context: ./notes-api
      dockerfile: Dockerfile
    container_name: notes-api
    restart: unless-stopped
    ports:
      - '5272:5272'
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__PostgresSqlConnection: >
        Host=postgres;Database=demo;Username=postgres;Password=admin;
      ConnectionStrings__Redis: redis:6379
      ConnectionStrings__Elasticsearch: http://elasticsearch:9200
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    networks:
      - notes-network

  # ── React Web App ───────────────────────────────────────────────────────────
  notes-web:
    build:
      context: ./notes-web
      dockerfile: Dockerfile
    container_name: notes-web
    restart: unless-stopped
    ports:
      - '3000:80'
    depends_on:
      - notes-api
    networks:
      - notes-network

volumes:
  postgres_data:
  redis_data:
  elasticsearch_data:

networks:
  notes-network:
    driver: bridge
