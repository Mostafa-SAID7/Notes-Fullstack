<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="100" height="100" fill="#1E293B"/>
  
  <!-- Notebook -->
  <g transform="translate(20, 15)">
    <!-- Back page -->
    <rect x="0" y="0" width="30" height="40" rx="2" fill="#0F172A" stroke="#3B82F6" stroke-width="1" opacity="0.6"/>
    
    <!-- Middle page -->
    <rect x="4" y="4" width="30" height="40" rx="2" fill="#1E293B" stroke="#3B82F6" stroke-width="1" opacity="0.8"/>
    
    <!-- Front page -->
    <rect x="8" y="8" width="30" height="40" rx="2" fill="#334155" stroke="#3B82F6" stroke-width="1.5"/>
    
    <!-- Lines -->
    <line x1="12" y1="16" x2="34" y2="16" stroke="#60A5FA" stroke-width="0.8" opacity="0.7"/>
    <line x1="12" y1="22" x2="34" y2="22" stroke="#60A5FA" stroke-width="0.8" opacity="0.7"/>
    <line x1="12" y1="28" x2="34" y2="28" stroke="#60A5FA" stroke-width="0.8" opacity="0.7"/>
    <line x1="12" y1="34" x2="30" y2="34" stroke="#60A5FA" stroke-width="0.8" opacity="0.7"/>
  </g>
</svg>
